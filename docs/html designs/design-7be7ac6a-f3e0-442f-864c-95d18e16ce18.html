    <script vid="117">
      function handleExport(type) {
        const card = document.getElementById('export-card')
        const success = document.getElementById('success-state')
        const title = document.getElementById('success-title')
        const msg = document.getElementById('success-message')

        card.classList.add(
          'opacity-0',
          'scale-95',
          'pointer-events-none',
          'transition-all',
          'duration-300'
        )

        if (type === 'clipboard') {
          title.innerText = 'Copied to Clipboard'
          msg.innerText = 'Markdown content is ready to paste.'
        } else if (type === 'link') {
          title.innerText = 'Link Created'
          msg.innerText = 'Shared link has been copied to clipboard.'
        } else {
          title.innerText = 'Download Started'
          msg.innerText = 'Your file is being prepared for download.'
        }

        setTimeout(() => {
          success.classList.remove('hidden')
        }, 200)
      }

      document.querySelectorAll('button').forEach((btn) => {
        btn.addEventListener('click', function () {
          this.classList.add('scale-[0.98]')
          setTimeout(() => this.classList.remove('scale-[0.98]'), 100)
        })
      })
    </script>
